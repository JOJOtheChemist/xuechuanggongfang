<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Office 文档预览</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background-color: #f5f5f5;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        #container {
            width: 100%;
            height: 100%;
            position: relative;
        }

        #office-frame {
            width: 100%;
            height: 100%;
            border: none;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #333;
            font-size: 16px;
            text-align: center;
            z-index: 10;
        }

        #loading .spinner {
            width: 40px;
            height: 40px;
            margin: 0 auto 16px;
            border: 4px solid rgba(0, 0, 0, 0.1);
            border-top-color: #6667ab;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #error {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #333;
            font-size: 14px;
            text-align: center;
            padding: 24px;
            display: none;
            z-index: 10;
        }

        /* 水印层 */
        #watermark {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 9999;
            overflow: hidden;
        }

        .watermark-item {
            position: absolute;
            color: #000000;
            font-size: 18px;
            opacity: 0.08;
            transform: rotate(-25deg);
            white-space: nowrap;
            user-select: none;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <div>加载文档中...</div>
    </div>
    
    <div id="error">
        <div style="font-size: 48px; margin-bottom: 16px;">📄</div>
        <div>文档加载失败</div>
        <div id="error-message" style="margin-top: 8px; color: #666; font-size: 12px;"></div>
    </div>

    <div id="container">
        <iframe id="office-frame"></iframe>
    </div>

    <!-- 水印层 -->
    <div id="watermark"></div>

    <script>
        const loadingDiv = document.getElementById('loading');
        const errorDiv = document.getElementById('error');
        const errorMessage = document.getElementById('error-message');
        const officeFrame = document.getElementById('office-frame');

        // 从 URL 获取参数
        function getUrlParams() {
            const params = {};
            const queryString = window.location.search.substring(1);
            const pairs = queryString.split('&');
            
            for (let pair of pairs) {
                const [key, value] = pair.split('=');
                params[decodeURIComponent(key)] = decodeURIComponent(value || '');
            }
            
            return params;
        }

        const params = getUrlParams();
        const fileUrl = params.url || '';
        const uid = params.uid || '';
        const fileName = params.fileName || 'document';

        console.log('Office 文档 URL:', fileUrl);
        console.log('UID:', uid);
        console.log('文件名:', fileName);

        // 生成水印
        function generateWatermark() {
            if (!uid) return;
            
            const watermarkDiv = document.getElementById('watermark');
            const text = `UID: ${uid}`;
            
            // 计算需要的行列数（基于窗口大小）
            const rows = Math.ceil(window.innerHeight / 100) + 5;
            const cols = 3;
            
            for (let i = 0; i < rows; i++) {
                for (let j = 0; j < cols; j++) {
                    const item = document.createElement('div');
                    item.className = 'watermark-item';
                    item.textContent = text;
                    item.style.top = (i * 100) + 'px';
                    item.style.left = (j * 33.33) + '%';
                    watermarkDiv.appendChild(item);
                }
            }
        }

        // 显示错误
        function showError(message) {
            loadingDiv.style.display = 'none';
            errorDiv.style.display = 'block';
            errorMessage.textContent = message;
        }

        // 加载 Office 文档
        function loadOfficeDocument() {
            if (!fileUrl) {
                showError('未提供文档地址');
                return;
            }

            // 使用微软 Office Web Viewer
            // 文档：https://docs.microsoft.com/en-us/microsoft-365/cloud-storage-partner-program/online/overview
            const viewerUrl = `https://view.officeapps.live.com/op/embed.aspx?src=${encodeURIComponent(fileUrl)}`;
            
            console.log('Office Viewer URL:', viewerUrl);
            
            officeFrame.src = viewerUrl;
            
            officeFrame.onload = function() {
                console.log('Office 文档加载完成');
                loadingDiv.style.display = 'none';
                generateWatermark();
            };

            officeFrame.onerror = function() {
                console.error('Office 文档加载失败');
                showError('文档加载失败，可能是格式不支持或文件损坏');
            };

            // 超时处理（30秒）
            setTimeout(() => {
                if (loadingDiv.style.display !== 'none') {
                    console.warn('Office 文档加载超时');
                    loadingDiv.style.display = 'none';
                    generateWatermark();
                }
            }, 30000);
        }

        // 初始化
        loadOfficeDocument();
    </script>
</body>
</html>
