<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PDF 预览</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background-color: #525659;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        #container {
            width: 100%;
            height: 100%;
            overflow: auto;
            position: relative;
        }

        #pdf-canvas {
            display: block;
            margin: 0 auto;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ffffff;
            font-size: 16px;
            text-align: center;
            z-index: 10;
        }

        #loading .spinner {
            width: 40px;
            height: 40px;
            margin: 0 auto 16px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top-color: #ffffff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #error {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ffffff;
            font-size: 14px;
            text-align: center;
            padding: 24px;
            display: none;
            z-index: 10;
        }

        #controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(0, 0, 0, 0.7);
            border-radius: 8px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 100;
        }

        #controls button {
            background-color: rgba(255, 255, 255, 0.2);
            color: #ffffff;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
        }

        #controls button:active {
            background-color: rgba(255, 255, 255, 0.3);
        }

        #controls button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #controls .page-info {
            color: #ffffff;
            font-size: 14px;
            padding: 0 8px;
        }

        /* 水印层 */
        #watermark {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 9999;
            overflow: hidden;
        }

        .watermark-item {
            position: absolute;
            color: #000000;
            font-size: 18px;
            opacity: 0.08;
            transform: rotate(-25deg);
            white-space: nowrap;
            user-select: none;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <div>加载中...</div>
    </div>
    
    <div id="error">
        <div>加载失败</div>
        <div id="error-message"></div>
    </div>

    <div id="container">
        <canvas id="pdf-canvas"></canvas>
    </div>

    <div id="controls">
        <button id="prev-page">上一页</button>
        <span class="page-info">
            <span id="current-page">1</span> / <span id="total-pages">1</span>
        </span>
        <button id="next-page">下一页</button>
    </div>

    <!-- 水印层 -->
    <div id="watermark"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        // 设置 PDF.js worker
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        let pdfDoc = null;
        let pageNum = 1;
        let pageRendering = false;
        let pageNumPending = null;
        let scale = 1.5;

        const canvas = document.getElementById('pdf-canvas');
        const ctx = canvas.getContext('2d');
        const loadingDiv = document.getElementById('loading');
        const errorDiv = document.getElementById('error');
        const errorMessage = document.getElementById('error-message');
        const prevButton = document.getElementById('prev-page');
        const nextButton = document.getElementById('next-page');
        const currentPageSpan = document.getElementById('current-page');
        const totalPagesSpan = document.getElementById('total-pages');

        // 从 URL 获取参数
        function getUrlParams() {
            const params = {};
            const queryString = window.location.search.substring(1);
            const pairs = queryString.split('&');
            
            for (let pair of pairs) {
                const [key, value] = pair.split('=');
                params[decodeURIComponent(key)] = decodeURIComponent(value || '');
            }
            
            return params;
        }

        const params = getUrlParams();
        const pdfUrl = params.url || '';
        const uid = params.uid || '';

        console.log('PDF URL:', pdfUrl);
        console.log('UID:', uid);

        // 生成水印
        function generateWatermark() {
            if (!uid) return;
            
            const watermarkDiv = document.getElementById('watermark');
            const text = `UID: ${uid}`;
            
            // 计算需要的行列数（基于窗口大小）
            const rows = Math.ceil(window.innerHeight / 100) + 5;
            const cols = 3;
            
            for (let i = 0; i < rows; i++) {
                for (let j = 0; j < cols; j++) {
                    const item = document.createElement('div');
                    item.className = 'watermark-item';
                    item.textContent = text;
                    item.style.top = (i * 100) + 'px';
                    item.style.left = (j * 33.33) + '%';
                    watermarkDiv.appendChild(item);
                }
            }
        }

        // 渲染页面
        function renderPage(num) {
            pageRendering = true;
            
            pdfDoc.getPage(num).then(page => {
                const viewport = page.getViewport({ scale: scale });
                canvas.height = viewport.height;
                canvas.width = viewport.width;

                const renderContext = {
                    canvasContext: ctx,
                    viewport: viewport
                };

                const renderTask = page.render(renderContext);

                renderTask.promise.then(() => {
                    pageRendering = false;
                    if (pageNumPending !== null) {
                        renderPage(pageNumPending);
                        pageNumPending = null;
                    }
                }).catch(err => {
                    console.error('渲染页面失败:', err);
                    pageRendering = false;
                });
            });

            currentPageSpan.textContent = num;
            updateButtons();
        }

        // 队列渲染
        function queueRenderPage(num) {
            if (pageRendering) {
                pageNumPending = num;
            } else {
                renderPage(num);
            }
        }

        // 更新按钮状态
        function updateButtons() {
            prevButton.disabled = (pageNum <= 1);
            nextButton.disabled = (pageNum >= pdfDoc.numPages);
        }

        // 上一页
        prevButton.addEventListener('click', () => {
            if (pageNum <= 1) return;
            pageNum--;
            queueRenderPage(pageNum);
        });

        // 下一页
        nextButton.addEventListener('click', () => {
            if (pageNum >= pdfDoc.numPages) return;
            pageNum++;
            queueRenderPage(pageNum);
        });

        // 加载 PDF
        function loadPDF() {
            if (!pdfUrl) {
                showError('未提供 PDF 地址');
                return;
            }

            pdfjsLib.getDocument(pdfUrl).promise.then(pdf => {
                console.log('PDF 加载成功');
                pdfDoc = pdf;
                totalPagesSpan.textContent = pdf.numPages;
                
                loadingDiv.style.display = 'none';
                renderPage(pageNum);
                generateWatermark();
            }).catch(err => {
                console.error('加载 PDF 失败:', err);
                showError('加载 PDF 失败: ' + err.message);
            });
        }

        // 显示错误
        function showError(message) {
            loadingDiv.style.display = 'none';
            errorDiv.style.display = 'block';
            errorMessage.textContent = message;
        }

        // 自动调整 scale
        function adjustScale() {
            const containerWidth = document.getElementById('container').clientWidth;
            // 假设 PDF 页面宽度为 595 (A4)
            scale = containerWidth / 595 * 0.9;
            if (pdfDoc) {
                renderPage(pageNum);
            }
        }

        // 监听窗口大小变化
        window.addEventListener('resize', adjustScale);

        // 初始化
        loadPDF();
    </script>
</body>
</html>
