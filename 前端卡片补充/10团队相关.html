
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的团队 & 成员列表</title>
    <style>
        /* --- 全局设置 --- */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #F8F7FC; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }

        /* 模拟手机容器 */
        .mobile-container {
            width: 100%;
            max-width: 400px;
            position: relative;
        }

        /* =========================================
           1. 团队卡片 (紧凑版)
           ========================================= */
        .team-card-compact {
            background: #ffffff;
            border-radius: 24px; /* 大圆角 */
            padding: 16px 20px;  /* 减少内边距 */
            box-shadow: 0 10px 30px rgba(139, 92, 246, 0.08);
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
            /* 装饰：背景微弱的渐变 */
            background: linear-gradient(to right, #ffffff 30%, #F5F3FF 100%);
        }

        /* 左侧信息区 */
        .team-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .label-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-label {
            font-size: 10px;
            color: #8B5CF6;
            background: #EDE9FE;
            padding: 2px 6px;
            border-radius: 6px;
            font-weight: 600;
        }

        .team-level-badge {
            font-size: 10px;
            /* 钻石质感渐变 */
            background: linear-gradient(135deg, #A78BFA, #7C3AED);
            color: white;
            padding: 2px 8px;
            border-radius: 99px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 2px;
        }

        .team-name {
            font-size: 17px;
            font-weight: 800;
            color: #1F2937;
            letter-spacing: -0.5px;
        }

        .member-count {
            font-size: 11px;
            color: #9CA3AF;
            margin-top: 2px;
        }

        /* 右侧按钮区 (胶囊按钮组) */
        .action-group {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            border: none;
            padding: 8px 16px;
            border-radius: 999px; /* 完全胶囊 */
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* 邀请按钮：空心描边风格 */
        .btn-invite {
            background: transparent;
            border: 1px solid #DDD6FE;
            color: #7C3AED;
        }
        .btn-invite:hover { background: #F5F3FF; }

        /* 查看按钮：实心渐变风格 */
        .btn-view {
            background: linear-gradient(135deg, #8B5CF6, #6D28D9);
            color: white;
            box-shadow: 0 4px 10px rgba(124, 58, 237, 0.2);
        }
        .btn-view:hover { transform: translateY(-1px); }

        /* =========================================
           2. 成员列表弹窗 (Modal)
           ========================================= */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(4px); /* 背景模糊 */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            
            /* 默认隐藏 */
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        /* 显示状态 */
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-card {
            width: 85%;
            max-width: 340px;
            background: white;
            border-radius: 28px;
            padding: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
        }

        .modal-overlay.active .modal-card {
            transform: scale(1);
        }

        /* 弹窗头部 */
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .modal-title { font-size: 18px; font-weight: 800; color: #4C1D95; }
        .close-btn {
            background: #F3F4F6;
            border: none;
            width: 30px; height: 30px;
            border-radius: 50%;
            color: #6B7280;
            font-size: 20px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }

        /* 成员列表 (滚动区域) */
        .member-list {
            list-style: none;
            max-height: 300px;
            overflow-y: auto;
            /* 隐藏滚动条但保留功能 */
            scrollbar-width: none; 
            -ms-overflow-style: none;
        }
        .member-list::-webkit-scrollbar { display: none; }

        /* 列表项 */
        .member-item {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #F3F4F6;
        }
        .member-item:last-child { border-bottom: none; }

        .avatar {
            width: 40px; height: 40px;
            border-radius: 50%;
            background: #EDE9FE;
            color: #7C3AED;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700;
            font-size: 14px;
            margin-right: 12px;
            flex-shrink: 0;
        }

        .member-info { flex-grow: 1; }
        .member-name { font-size: 14px; font-weight: 600; color: #374151; }
        .member-role { font-size: 11px; color: #9CA3AF; margin-top: 2px; }
        
        /* 角色标签 */
        .role-tag {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            background: #F3F4F6;
            color: #6B7280;
            margin-left: 6px;
        }
        .role-tag.admin { background: #FEF3C7; color: #D97706; } /* 金色管理员 */

    </style>
</head>
<body>

<div class="mobile-container">

    <div class="team-card-compact">
        
        <div class="team-info">
            <div class="label-row">
                <span class="card-label">我的团队</span>
                <div class="team-level-badge">💎 钻石团队</div>
            </div>
            <div class="team-name">北京精英团队</div>
            <div class="member-count">组员: 12 人</div>
        </div>

        <div class="action-group">
            <button class="action-btn btn-invite">
                <span>+</span> 邀请
            </button>
            <button class="action-btn btn-view" onclick="openModal()">
                查看
            </button>
        </div>
    </div>

</div>

<div class="modal-overlay" id="memberModal" onclick="closeModal(event)">
    <div class="modal-card" onclick="event.stopPropagation()">
        
        <div class="modal-header">
            <div class="modal-title">团队成员 (12)</div>
            <button class="close-btn" onclick="closeModalDirect()">×</button>
        </div>

        <ul class="member-list">
            <li class="member-item">
                <div class="avatar" style="background:#FEF3C7; color:#D97706;">王</div>
                <div class="member-info">
                    <div class="member-name">王队长 <span class="role-tag admin">队长</span></div>
                    <div class="member-role">创建于 2024.12.01</div>
                </div>
            </li>

            <li class="member-item">
                <div class="avatar">李</div>
                <div class="member-info">
                    <div class="member-name">李小明</div>
                    <div class="member-role">活跃用户</div>
                </div>
            </li>

            <li class="member-item">
                <div class="avatar">C</div>
                <div class="member-info">
                    <div class="member-name">Chris Wu</div>
                    <div class="member-role">今日已签到</div>
                </div>
            </li>

            <li class="member-item">
                <div class="avatar">陈</div>
                <div class="member-info">
                    <div class="member-name">陈大发</div>
                    <div class="member-role">新加入</div>
                </div>
            </li>

            <li class="member-item">
                <div class="avatar">Z</div>
                <div class="member-info">
                    <div class="member-name">Zhang San</div>
                    <div class="member-role">离线</div>
                </div>
            </li>
        </ul>

    </div>
</div>

<script>
    // 打开弹窗
    function openModal() {
        document.getElementById('memberModal').classList.add('active');
    }

    // 点击背景关闭
    function closeModal(event) {
        document.getElementById('memberModal').classList.remove('active');
    }

    // 点击X关闭
    function closeModalDirect() {
        document.getElementById('memberModal').classList.remove('active');
    }
</script>

</body>
</html>
