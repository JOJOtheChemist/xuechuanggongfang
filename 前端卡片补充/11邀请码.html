<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>邀请卡片</title>
    <style>
        /* --- 全局设置 --- */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #F8F7FC; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }

        .mobile-container { width: 100%; max-width: 400px; }

        /* =========================================
           1. 邀请卡片主体
           ========================================= */
        .invite-card {
            background: white;
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(139, 92, 246, 0.08);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* 顶部标题区 */
        .invite-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        
        .invite-title { font-size: 16px; font-weight: 800; color: #1F2937; margin-bottom: 4px; }
        .invite-subtitle { font-size: 11px; color: #6B7280; }

        /* 查看大码按钮 (小图标风格) */
        .qr-mini-btn {
            background: #F3F0FF;
            color: #7C3AED;
            border: none;
            padding: 6px 10px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .qr-mini-btn:hover { background: #EDE9FE; transform: translateY(-1px); }

        /* 中间：邀请码区域 (虚线框) */
        .code-box {
            background: #FAFAFA;
            border: 2px dashed #E5E7EB;
            border-radius: 16px;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .my-code-label { font-size: 10px; color: #9CA3AF; display: block; margin-bottom: 2px; }
        .my-code-val { font-size: 20px; font-weight: 800; color: #4C1D95; letter-spacing: 1px; }

        .copy-btn {
            font-size: 12px;
            color: #7C3AED;
            font-weight: 700;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 6px;
            transition: background 0.2s;
        }
        .copy-btn:active { background: #EDE9FE; }

        /* 底部：数据统计 (两列) */
        .stats-row {
            display: flex;
            gap: 10px;
        }

        .stat-item {
            flex: 1;
            background: #F9FAFB;
            border-radius: 12px;
            padding: 10px 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .stat-label { font-size: 10px; color: #6B7280; margin-bottom: 4px; }
        
        .stat-val { font-size: 16px; font-weight: 700; color: #1F2937; }
        .stat-val.money { color: #F59E0B; /* 金钱用金色/橙色 */ }
        .stat-unit { font-size: 10px; font-weight: 400; color: #9CA3AF; margin-left: 2px; }

        /* =========================================
           2. 二维码弹窗 (Modal)
           ========================================= */
        .qr-modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
            z-index: 2000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }
        
        .qr-modal.active { opacity: 1; visibility: visible; }

        .qr-card-large {
            width: 300px;
            background: white;
            border-radius: 24px;
            padding: 30px 20px;
            text-align: center;
            transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
        }

        .qr-modal.active .qr-card-large { transform: scale(1); }

        .qr-image-placeholder {
            width: 180px; height: 180px;
            background: #F3F0FF;
            margin: 0 auto 20px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #7C3AED;
        }
        
        .save-img-btn {
            background: linear-gradient(135deg, #8B5CF6, #6D28D9);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 99px;
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(124, 58, 237, 0.3);
            cursor: pointer;
        }

        .close-qr {
            position: absolute;
            top: 15px; right: 15px;
            width: 30px; height: 30px;
            background: #F3F4F6;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: #666;
            cursor: pointer;
        }

    </style>
</head>
<body>

<div class="mobile-container">

    <div class="invite-card">
        
        <div class="invite-header">
            <div>
                <div class="invite-title">我的专属邀请码 ✨</div>
                <div class="invite-subtitle">邀请好友加入 北京精英团队</div>
            </div>
            <button class="qr-mini-btn" onclick="showQrModal()">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                查看大码
            </button>
        </div>

        <div class="code-box">
            <div>
                <span class="my-code-label">点击复制邀请码</span>
                <span class="my-code-val">XJ92-K82</span>
            </div>
            <div class="copy-btn" onclick="copyCode(this)">复制</div>
        </div>

        <div class="stats-row">
            <div class="stat-item">
                <div class="stat-label">已邀请人数</div>
                <div class="stat-val">12 <span class="stat-unit">人</span></div>
            </div>
            <div class="stat-item">
                <div class="stat-label">累计收益</div>
                <div class="stat-val money">¥1,250.00</div>
            </div>
        </div>

    </div>

</div>

<div class="qr-modal" id="qrModal" onclick="closeQrModal()">
    <div class="qr-card-large" onclick="event.stopPropagation()">
        <div class="close-qr" onclick="closeQrModal()">×</div>
        
        <div style="font-size: 18px; font-weight: 800; color: #4C1D95; margin-bottom: 5px;">扫码加入团队</div>
        <div style="font-size: 12px; color: #6B7280; margin-bottom: 20px;">邀请码：XJ92-K82</div>
        
        <div class="qr-image-placeholder">
            <svg width="100" height="100" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 3h6v6H3zM15 3h6v6h-6zM3 15h6v6H3zM15 15h6v6h-6zM7 7h2v2H7zM19 7h2v2h-2zM7 19h2v2H7zM19 19h2v2h-2z"/></svg>
        </div>

        <button class="save-img-btn">保存海报图片</button>
    </div>
</div>

<script>
    function showQrModal() {
        document.getElementById('qrModal').classList.add('active');
    }

    function closeQrModal() {
        document.getElementById('qrModal').classList.remove('active');
    }

    function copyCode(btn) {
        // 模拟复制
        let original = btn.innerText;
        btn.innerText = "已复制";
        btn.style.color = "#10B981"; // 绿色
        setTimeout(() => {
            btn.innerText = original;
            btn.style.color = "#7C3AED";
        }, 1500);
    }
</script>

</body>
</html>
