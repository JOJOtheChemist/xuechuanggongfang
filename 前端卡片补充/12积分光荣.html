<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>积分光荣榜 - 精致版</title>
    <style>
        /* --- 全局设置 --- */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #F8F7FC; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }

        .mobile-container { width: 100%; max-width: 360px; }

        /* --- 卡片主体 --- */
        .rank-card {
            background: #ffffff;
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(139, 92, 246, 0.08);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* 1. 顶部 Header */
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-title-box {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .title-row {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .main-title {
            font-size: 16px;
            font-weight: 800;
            color: #1F2937;
        }

        .icon-trophy {
            width: 18px; height: 18px;
            color: #F59E0B; /* 金色奖杯 */
        }

        .sub-info {
            font-size: 11px;
            color: #9CA3AF;
            font-weight: 500;
        }

        .view-all-btn {
            font-size: 12px;
            color: #8B5CF6;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 2px;
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 99px;
            background: #F3F0FF;
            transition: background 0.2s;
        }
        .view-all-btn:hover { background: #EDE9FE; }

        /* 2. 我的数据 (深色胶囊) */
        .my-stats-pill {
            background: linear-gradient(135deg, #8B5CF6, #6D28D9);
            border-radius: 18px;
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            box-shadow: 0 8px 20px rgba(124, 58, 237, 0.25);
            position: relative;
            overflow: hidden;
        }

        /* 装饰圆圈背景 */
        .my-stats-pill::after {
            content: '';
            position: absolute;
            top: -20px; right: -20px;
            width: 80px; height: 80px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
        }

        .stat-box { display: flex; flex-direction: column; gap: 2px; }
        .stat-label { font-size: 11px; opacity: 0.85; font-weight: 500; }
        .stat-value { font-size: 22px; font-weight: 800; line-height: 1; letter-spacing: -0.5px; }
        
        .divider { width: 1px; height: 24px; background: rgba(255,255,255,0.2); }

        /* 3. 排行榜列表 */
        .rank-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-top: 4px;
        }

        .rank-item {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            border-radius: 16px;
            background: #FAFAFA; /* 极淡的底色 */
            transition: all 0.2s;
        }
        
        /* 排名数字 */
        .rank-num {
            width: 24px;
            font-size: 16px;
            font-weight: 800;
            text-align: center;
            margin-right: 8px;
            font-style: italic; /* 斜体更有动感 */
        }
        
        /* 颜色定义 */
        .rank-1 { color: #F59E0B; } /* 金 */
        .rank-2 { color: #9CA3AF; } /* 银 */
        .rank-3 { color: #D97706; } /* 铜 */

        /* 头像 */
        .avatar {
            width: 36px; height: 36px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 13px; font-weight: 700;
            margin-right: 10px;
            flex-shrink: 0;
            border: 2px solid white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }
        
        .avatar-1 { background: #FEF3C7; color: #D97706; }
        .avatar-2 { background: #F3F4F6; color: #4B5563; }

        /* 用户信息 */
        .user-info { flex-grow: 1; }
        .user-name { font-size: 14px; font-weight: 600; color: #374151; display: flex; align-items: center; gap: 4px; }
        
        /* 皇冠图标 (仅第一名) */
        .crown-icon { width: 14px; height: 14px; fill: #F59E0B; }

        /* 分数 */
        .score-val { font-size: 16px; font-weight: 800; color: #7C3AED; }
        .score-unit { font-size: 11px; font-weight: 500; color: #9CA3AF; margin-left: 2px; }

    </style>
</head>
<body>

<div class="mobile-container">
    
    <div class="rank-card">
        
        <div class="card-header">
            <div class="header-title-box">
                <div class="title-row">
                    <svg class="icon-trophy" viewBox="0 0 24 24" fill="currentColor"><path d="M5 2c0-.55.45-1 1-1h12c.55 0 1 .45 1 1v2c0 1.3-.84 2.4-2 2.82V9.5c0 2.27-1.63 4.14-3.8 4.45l.8 2.55h2.5c.28 0 .5.22.5.5s-.22.5-.5.5H7.5c-.28 0-.5-.22-.5-.5s.22-.5.5-.5h2.5l.8-2.55C8.63 13.64 7 11.77 7 9.5V6.82C5.84 6.4 5 5.3 5 4V2zm2 2v2.5c0 1.55 1.12 2.84 2.6 2.97L9 9.5h6l-.6-.03C15.88 9.34 17 8.05 17 6.5V4H7z"/></svg>
                    <span class="main-title">积分光荣榜</span>
                </div>
                <div class="sub-info">已上榜用户: 2 人</div>
            </div>
            
            <a href="#" class="view-all-btn">
                查看全部 
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
            </a>
        </div>

        <div class="my-stats-pill">
            <div class="stat-box">
                <span class="stat-label">我的积分</span>
                <span class="stat-value">40</span>
            </div>
            <div class="divider"></div>
            <div class="stat-box" style="align-items: flex-end;">
                <span class="stat-label">我的名次</span>
                <span class="stat-value">NO.1</span>
            </div>
        </div>

        <div class="rank-list">
            
            <div class="rank-item">
                <div class="rank-num rank-1">1</div>
                <div class="avatar avatar-1">哈</div>
                <div class="user-info">
                    <div class="user-name">
                        哈哈哈哈 
                        <svg class="crown-icon" viewBox="0 0 24 24"><path d="M5 16L3 5l5.5 5L12 4l3.5 6L21 5l-2 11H5zm14 3c0 .6-.4 1-1 1H6c-.6 0-1-.4-1-1v-1h14v1z"/></svg>
                    </div>
                </div>
                <div class="score-val">40<span class="score-unit">分</span></div>
            </div>

            <div class="rank-item">
                <div class="rank-num rank-2">2</div>
                <div class="avatar avatar-2">x</div>
                <div class="user-info">
                    <div class="user-name">用户xN7R4w</div>
                </div>
                <div class="score-val">25<span class="score-unit">分</span></div>
            </div>

        </div>

    </div>

</div>

</body>
</html>
