<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>积分光荣榜 - 含弹窗</title>
    <style>
        /* --- 全局设置 --- */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #F8F7FC; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }

        .mobile-container { width: 100%; max-width: 360px; }

        /* =========================================
           1. 主卡片样式
           ========================================= */
        .rank-card {
            background: #ffffff;
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(139, 92, 246, 0.08);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* 顶部 Header */
        .card-header { display: flex; justify-content: space-between; align-items: center; }
        .title-row { display: flex; align-items: center; gap: 6px; }
        .main-title { font-size: 16px; font-weight: 800; color: #1F2937; }
        .icon-trophy { width: 18px; height: 18px; color: #F59E0B; }
        .sub-info { font-size: 11px; color: #9CA3AF; margin-top: 2px; }

        /* 查看全部按钮 */
        .view-all-btn {
            font-size: 12px; color: #8B5CF6;
            background: #F3F0FF; padding: 4px 10px;
            border-radius: 99px; border: none;
            display: flex; align-items: center; gap: 4px;
            font-weight: 600; cursor: pointer;
            transition: background 0.2s;
        }
        .view-all-btn:hover { background: #EDE9FE; }

        /* 我的战绩胶囊 */
        .my-stats-pill {
            background: linear-gradient(135deg, #8B5CF6, #6D28D9);
            border-radius: 18px; padding: 14px 20px;
            display: flex; justify-content: space-between; align-items: center;
            color: white; box-shadow: 0 8px 20px rgba(124, 58, 237, 0.25);
            position: relative; overflow: hidden;
        }
        .my-stats-pill::after {
            content: ''; position: absolute; top: -20px; right: -20px;
            width: 80px; height: 80px; background: rgba(255,255,255,0.1); border-radius: 50%;
        }
        .stat-box { display: flex; flex-direction: column; gap: 2px; }
        .stat-label { font-size: 11px; opacity: 0.85; font-weight: 500; }
        .stat-value { font-size: 22px; font-weight: 800; line-height: 1; }
        .divider { width: 1px; height: 24px; background: rgba(255,255,255,0.2); }

        /* 列表通用样式 */
        .rank-list-preview { display: flex; flex-direction: column; gap: 10px; }
        
        .rank-item {
            display: flex; align-items: center;
            padding: 10px 12px; border-radius: 16px;
            background: #FAFAFA; transition: all 0.2s;
        }
        /* 弹窗里的列表项稍微紧凑一点，或者是白色背景 */
        .modal-body .rank-item { background: #fff; border-bottom: 1px solid #F3F4F6; border-radius: 0; padding: 12px 0; }
        .modal-body .rank-item:last-child { border-bottom: none; }

        .rank-num {
            width: 24px; font-size: 16px; font-weight: 800;
            text-align: center; margin-right: 10px; font-style: italic;
        }
        .rank-1 { color: #F59E0B; } /* 金 */
        .rank-2 { color: #9CA3AF; } /* 银 */
        .rank-3 { color: #D97706; } /* 铜 */
        .rank-normal { color: #9CA3AF; font-size: 14px; font-style: normal; font-weight: 600; }

        .avatar {
            width: 36px; height: 36px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: 700; margin-right: 12px; flex-shrink: 0;
            background: #F3F4F6; color: #6B7280;
        }
        .avatar-1 { background: #FEF3C7; color: #D97706; }
        .avatar-2 { background: #E5E7EB; color: #374151; }
        .avatar-3 { background: #FFEDD5; color: #9A3412; }

        .user-info { flex-grow: 1; }
        .user-name { font-size: 14px; font-weight: 600; color: #374151; display: flex; align-items: center; gap: 4px; }
        .crown-icon { width: 14px; height: 14px; fill: #F59E0B; }
        
        .score-val { font-size: 15px; font-weight: 800; color: #7C3AED; }
        .score-unit { font-size: 10px; font-weight: 500; color: #9CA3AF; margin-left: 1px; }

        /* =========================================
           2. 弹窗 (Modal) 样式
           ========================================= */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: flex; justify-content: center; align-items: center;
            opacity: 0; visibility: hidden; transition: all 0.3s;
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }

        .modal-card {
            width: 85%; max-width: 340px;
            background: #F9FAFB; /* 浅灰底，区分列表白底 */
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            transform: scale(0.9); transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex; flex-direction: column; max-height: 80vh;
        }
        .modal-overlay.active .modal-card { transform: scale(1); }

        .modal-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 15px; flex-shrink: 0;
        }
        .modal-title { font-size: 18px; font-weight: 800; color: #1F2937; }
        .close-btn {
            width: 28px; height: 28px; border-radius: 50%;
            background: #E5E7EB; border: none; color: #6B7280;
            font-size: 18px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }

        /* 弹窗内的滚动列表 */
        .modal-list-scroll {
            overflow-y: auto;
            background: #fff;
            border-radius: 16px;
            padding: 5px 15px;
            /* 隐藏滚动条 */
            scrollbar-width: none; -ms-overflow-style: none;
        }
        .modal-list-scroll::-webkit-scrollbar { display: none; }

        /* 底部固定显示的“我的排名” (可选，增加高级感) */
        .modal-footer-my {
            margin-top: 15px;
            background: #fff;
            border-radius: 16px;
            padding: 10px 15px;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.03);
            flex-shrink: 0;
        }

    </style>
</head>
<body>

<div class="mobile-container">
    
    <div class="rank-card">
        <div class="card-header">
            <div class="title-row">
                <svg class="icon-trophy" viewBox="0 0 24 24" fill="currentColor"><path d="M5 2c0-.55.45-1 1-1h12c.55 0 1 .45 1 1v2c0 1.3-.84 2.4-2 2.82V9.5c0 2.27-1.63 4.14-3.8 4.45l.8 2.55h2.5c.28 0 .5.22.5.5s-.22.5-.5.5H7.5c-.28 0-.5-.22-.5-.5s.22-.5.5-.5h2.5l.8-2.55C8.63 13.64 7 11.77 7 9.5V6.82C5.84 6.4 5 5.3 5 4V2zm2 2v2.5c0 1.55 1.12 2.84 2.6 2.97L9 9.5h6l-.6-.03C15.88 9.34 17 8.05 17 6.5V4H7z"/></svg>
                <span class="main-title">积分光荣榜</span>
            </div>
            <button class="view-all-btn" onclick="openRankModal()">
                查看全部 
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
            </button>
        </div>

        <div class="my-stats-pill">
            <div class="stat-box">
                <span class="stat-label">我的积分</span>
                <span class="stat-value">40</span>
            </div>
            <div class="divider"></div>
            <div class="stat-box" style="align-items: flex-end;">
                <span class="stat-label">我的名次</span>
                <span class="stat-value">NO.1</span>
            </div>
        </div>

        <div class="rank-list-preview">
            <div class="rank-item">
                <div class="rank-num rank-1">1</div>
                <div class="avatar avatar-1">哈</div>
                <div class="user-info">
                    <div class="user-name">哈哈哈哈 <svg class="crown-icon" viewBox="0 0 24 24"><path d="M5 16L3 5l5.5 5L12 4l3.5 6L21 5l-2 11H5zm14 3c0 .6-.4 1-1 1H6c-.6 0-1-.4-1-1v-1h14v1z"/></svg></div>
                </div>
                <div class="score-val">40 <span class="score-unit">分</span></div>
            </div>
            <div class="rank-item">
                <div class="rank-num rank-2">2</div>
                <div class="avatar avatar-2">x</div>
                <div class="user-info"><div class="user-name">用户xN7R4w</div></div>
                <div class="score-val">25 <span class="score-unit">分</span></div>
            </div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="rankModal" onclick="closeRankModal()">
    <div class="modal-card modal-body" onclick="event.stopPropagation()">
        
        <div class="modal-header">
            <div class="modal-title">完整榜单 🏆</div>
            <button class="close-btn" onclick="closeRankModal()">×</button>
        </div>

        <div class="modal-list-scroll">
            
            <div class="rank-item">
                <div class="rank-num rank-1">1</div>
                <div class="avatar avatar-1">哈</div>
                <div class="user-info">
                    <div class="user-name">哈哈哈哈 <svg class="crown-icon" viewBox="0 0 24 24"><path d="M5 16L3 5l5.5 5L12 4l3.5 6L21 5l-2 11H5zm14 3c0 .6-.4 1-1 1H6c-.6 0-1-.4-1-1v-1h14v1z"/></svg></div>
                </div>
                <div class="score-val">40</div>
            </div>

            <div class="rank-item">
                <div class="rank-num rank-2">2</div>
                <div class="avatar avatar-2">x</div>
                <div class="user-info"><div class="user-name">用户xN7R4w</div></div>
                <div class="score-val">25</div>
            </div>

            <div class="rank-item">
                <div class="rank-num rank-3">3</div>
                <div class="avatar avatar-3">L</div>
                <div class="user-info"><div class="user-name">LuckyDog</div></div>
                <div class="score-val">18</div>
            </div>

            <div class="rank-item">
                <div class="rank-num rank-normal">4</div>
                <div class="avatar">陈</div>
                <div class="user-info"><div class="user-name">陈同学</div></div>
                <div class="score-val">12</div>
            </div>

            <div class="rank-item">
                <div class="rank-num rank-normal">5</div>
                <div class="avatar">M</div>
                <div class="user-info"><div class="user-name">Momo</div></div>
                <div class="score-val">9</div>
            </div>
             <div class="rank-item">
                <div class="rank-num rank-normal">6</div>
                <div class="avatar">J</div>
                <div class="user-info"><div class="user-name">Jacky</div></div>
                <div class="score-val">5</div>
            </div>

        </div>

        <div class="modal-footer-my">
            <div class="rank-item" style="padding: 0; background: none; border:none;">
                <div class="rank-num rank-1" style="font-size: 14px;">1</div>
                <div class="avatar avatar-1" style="width: 30px; height: 30px; font-size: 10px;">哈</div>
                <div class="user-info">
                    <div class="user-name" style="font-size: 13px;">我 (哈哈哈哈)</div>
                </div>
                <div class="score-val" style="font-size: 14px;">40分</div>
            </div>
        </div>

    </div>
</div>

<script>
    function openRankModal() {
        document.getElementById('rankModal').classList.add('active');
    }

    function closeRankModal() {
        document.getElementById('rankModal').classList.remove('active');
    }
</script>

</body>
</html>
