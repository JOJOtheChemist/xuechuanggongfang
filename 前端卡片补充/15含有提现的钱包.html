<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>钱包与新币明细</title>
    <style>
        /* --- 全局设置 --- */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #F8F7FC; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }

        .mobile-container { width: 100%; max-width: 400px; }

        /* =========================================
           1. 钱包卡片 (Wallet Card)
           ========================================= */
        .wallet-card {
            /* 深紫色渐变背景 */
            background: linear-gradient(135deg, #7C3AED, #5B21B6);
            border-radius: 28px;
            padding: 24px;
            color: white;
            box-shadow: 0 15px 40px rgba(124, 58, 237, 0.3);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 200px;
        }

        /* 装饰背景圆 */
        .wallet-card::before {
            content: ''; position: absolute; top: -50px; right: -50px;
            width: 150px; height: 150px;
            background: rgba(255,255,255,0.1); border-radius: 50%; pointer-events: none;
        }

        /* 顶部：标题 + 历史按钮 */
        .card-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px;
        }
        .wallet-label { font-size: 14px; opacity: 0.9; font-weight: 500; display: flex; align-items: center; gap: 6px; }
        
        /* 历史记录按钮 (透明) */
        .history-btn {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            font-size: 12px;
            padding: 6px 12px;
            border-radius: 99px;
            cursor: pointer;
            backdrop-filter: blur(4px);
            transition: background 0.2s;
        }
        .history-btn:hover { background: rgba(255,255,255,0.25); }

        /* 金额区域 */
        .balance-area { margin-bottom: 20px; }
        .currency-symbol { font-size: 20px; font-weight: 600; vertical-align: top; margin-right: 2px; }
        .balance-num { font-size: 42px; font-weight: 800; letter-spacing: -1px; line-height: 1; }

        /* 审核状态条 (玻璃态胶囊) */
        .audit-status-bar {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            border-radius: 12px;
            padding: 10px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            cursor: pointer;
        }
        
        .audit-info { display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 500; }
        .audit-dot { width: 8px; height: 8px; background: #F59E0B; border-radius: 50%; box-shadow: 0 0 8px rgba(245, 158, 11, 0.6); animation: pulse 2s infinite; }
        
        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* 提现大按钮 */
        .withdraw-btn {
            background: white;
            color: #6D28D9;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 99px;
            font-size: 16px; font-weight: 700;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        .withdraw-btn:active { transform: scale(0.98); opacity: 0.9; }


        /* =========================================
           2. 资金明细弹窗 (Timeline Modal)
           ========================================= */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(5px);
            z-index: 1000;
            display: flex; justify-content: center; align-items: flex-end; /* 底部弹出 */
            opacity: 0; visibility: hidden; transition: all 0.3s;
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }

        .modal-card {
            background: white;
            width: 100%; max-width: 420px;
            border-top-left-radius: 32px; border-top-right-radius: 32px;
            padding: 25px 20px 40px 20px;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.1);
            transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            max-height: 80vh; display: flex; flex-direction: column;
        }
        .modal-overlay.active .modal-card { transform: translateY(0); }

        /* 弹窗头部 */
        .modal-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 25px;
        }
        .modal-title { font-size: 18px; font-weight: 800; color: #1F2937; }
        .close-btn {
            width: 30px; height: 30px; border-radius: 50%;
            background: #F3F4F6; border: none; color: #6B7280;
            font-size: 20px; display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }

        /* 时间线列表容器 */
        .timeline-list {
            overflow-y: auto;
            padding-left: 10px; /* 给左侧线条留空 */
        }

        /* 单个时间线项目 */
        .timeline-item {
            display: flex;
            position: relative;
            padding-bottom: 30px; /* item间距 */
        }
        
        /* 左侧连线 (除了最后一个) */
        .timeline-item:not(:last-child)::before {
            content: '';
            position: absolute;
            left: 19px; top: 38px; bottom: 0;
            width: 2px; background: #F3F4F6;
        }

        /* 左侧图标容器 */
        .timeline-icon-box {
            width: 40px; height: 40px;
            border-radius: 50%;
            background: #F3F4F6;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            margin-right: 15px;
            z-index: 2; /* 盖住线条 */
            border: 3px solid white; /* 白色描边，与线条隔开 */
        }

        /* 图标 SVG 样式 */
        .timeline-icon-box svg { width: 18px; height: 18px; stroke-width: 2.5; }

        /* 状态颜色 */
        /* 审核中 (橙色) */
        .status-pending .timeline-icon-box { background: #FFF7ED; color: #F59E0B; }
        .status-pending .item-amount { color: #1F2937; } /* 黑色金额 */

        /* 已完成 (绿色) */
        .status-success .timeline-icon-box { background: #ECFDF5; color: #10B981; }
        .status-success .item-amount { color: #1F2937; }

        /* 右侧内容 */
        .item-content { flex-grow: 1; display: flex; justify-content: space-between; align-items: flex-start; padding-top: 2px; }
        
        .item-main { display: flex; flex-direction: column; gap: 4px; }
        .item-title { font-size: 15px; font-weight: 600; color: #374151; }
        .item-date { font-size: 11px; color: #9CA3AF; }
        
        .item-right { text-align: right; }
        .item-amount { font-size: 16px; font-weight: 700; }
        .item-status-text { font-size: 11px; font-weight: 500; margin-top: 4px; }
        
        .status-pending .item-status-text { color: #F59E0B; }
        .status-success .item-status-text { color: #10B981; }

    </style>
</head>
<body>

<div class="mobile-container">
    
    <div class="wallet-card">
        
        <div class="card-header">
            <div class="wallet-label">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
                账户余额
            </div>
            <button class="history-btn" onclick="openModal()">新币明细 ></button>
        </div>

        <div class="balance-area">
            <span class="currency-symbol">¥</span>
            <span class="balance-num">12,580.00</span>
        </div>

        <div class="audit-status-bar" onclick="openModal()">
            <div class="audit-info">
                <div class="audit-dot"></div>
                <span>当前有 2 笔提现正在审核中</span>
            </div>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><polyline points="9 18 15 12 9 6"></polyline></svg>
        </div>

        <button class="withdraw-btn">立即提现</button>

    </div>

</div>

<div class="modal-overlay" id="historyModal" onclick="closeModal(event)">
    <div class="modal-card" onclick="event.stopPropagation()">
        
        <div class="modal-header">
            <div class="modal-title">新币明细</div>
            <button class="close-btn" onclick="closeModalDirect()">×</button>
        </div>

        <div class="timeline-list">

            <!-- 1. 审核中 -->
            <div class="timeline-item status-pending">
                <div class="timeline-icon-box">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                </div>
                <div class="item-content">
                    <div class="item-main">
                        <div class="item-title">余额提现</div>
                        <div class="item-date">今天 14:30</div>
                    </div>
                    <div class="item-right">
                        <div class="item-amount">- 200.00</div>
                        <div class="item-status-text">审核中</div>
                    </div>
                </div>
            </div>

            <!-- 2. 审核中 -->
            <div class="timeline-item status-pending">
                <div class="timeline-icon-box">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                </div>
                <div class="item-content">
                    <div class="item-main">
                        <div class="item-title">余额提现</div>
                        <div class="item-date">今天 09:15</div>
                    </div>
                    <div class="item-right">
                        <div class="item-amount">- 500.00</div>
                        <div class="item-status-text">审核中</div>
                    </div>
                </div>
            </div>

            <!-- 3. 已完成 (收入) -->
            <div class="timeline-item status-success">
                <div class="timeline-icon-box">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="20 6 9 17 4 12"></polyline></svg>
                </div>
                <div class="item-content">
                    <div class="item-main">
                        <div class="item-title">邀请奖励发放</div>
                        <div class="item-date">昨天 18:20</div>
                    </div>
                    <div class="item-right">
                        <div class="item-amount" style="color:#10B981">+ 50.00</div>
                        <div class="item-status-text">已完成</div>
                    </div>
                </div>
            </div>

            <!-- 4. 已完成 (支出) -->
            <div class="timeline-item status-success">
                <div class="timeline-icon-box">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="20 6 9 17 4 12"></polyline></svg>
                </div>
                <div class="item-content">
                    <div class="item-main">
                        <div class="item-title">余额提现</div>
                        <div class="item-date">2025-11-23 10:00</div>
                    </div>
                    <div class="item-right">
                        <div class="item-amount">- 1,000.00</div>
                        <div class="item-status-text">已完成</div>
                    </div>
                </div>
            </div>

            <!-- 5. 新增：新用户注册奖励 -->
            <div class="timeline-item status-success">
                <div class="timeline-icon-box">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="20 6 9 17 4 12"></polyline></svg>
                </div>
                <div class="item-content">
                    <div class="item-main">
                        <div class="item-title">新用户注册奖励</div>
                        <div class="item-date">2025-11-20 09:00</div>
                    </div>
                    <div class="item-right">
                        <div class="item-amount" style="color:#10B981">+ 100.00</div>
                        <div class="item-status-text">已完成</div>
                    </div>
                </div>
            </div>

            <!-- 6. 新增：每日签到 -->
            <div class="timeline-item status-success">
                <div class="timeline-icon-box">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="20 6 9 17 4 12"></polyline></svg>
                </div>
                <div class="item-content">
                    <div class="item-main">
                        <div class="item-title">每日签到</div>
                        <div class="item-date">2025-11-21 08:00</div>
                    </div>
                    <div class="item-right">
                        <div class="item-amount" style="color:#10B981">+ 10.00</div>
                        <div class="item-status-text">已完成</div>
                    </div>
                </div>
            </div>

        </div>

    </div>
</div>

<script>
    function openModal() {
        document.getElementById('historyModal').classList.add('active');
    }

    function closeModal(event) {
        document.getElementById('historyModal').classList.remove('active');
    }
    
    function closeModalDirect() {
        document.getElementById('historyModal').classList.remove('active');
    }
</script>

</body>
</html>
