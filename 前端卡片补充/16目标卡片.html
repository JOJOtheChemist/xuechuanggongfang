<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>营销目标设定</title>
    <style>
        /* --- 全局设置 --- */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #F8F7FC; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        
        /* 模拟手机宽度 */
        .mobile-container { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 20px; }

        /* =========================================
           1. 顶部状态卡片组 (Row of Cards)
           ========================================= */
        .stats-row {
            display: flex;
            gap: 12px;
        }

        .stat-card {
            flex: 1;
            background: white;
            border-radius: 20px;
            padding: 16px;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.05);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
            min-height: 100px;
        }

        /* 标题与图标 */
        .card-head { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #6B7280; font-weight: 600; margin-bottom: 8px; }
        .card-head svg { width: 16px; height: 16px; }

        /* 数字 */
        .card-num { font-size: 28px; font-weight: 800; line-height: 1.1; }
        .num-unit { font-size: 12px; font-weight: 500; margin-left: 2px; color: #9CA3AF; }

        /* --- 左卡片：已完成 (绿色系) --- */
        .stat-card.done .card-head { color: #059669; }
        .stat-card.done .card-num { color: #10B981; }
        /* 装饰背景 */
        .stat-card.done::after {
            content: ''; position: absolute; right: -10px; bottom: -10px;
            width: 60px; height: 60px; border-radius: 50%;
            background: rgba(16, 185, 129, 0.08); pointer-events: none;
        }

        /* --- 右卡片：待完成 (紫色/橙色系) --- */
        .stat-card.pending .card-head { color: #D97706; }
        .stat-card.pending .card-num { color: #F59E0B; margin-bottom: 6px; }
        
        /* 制定计划按钮 */
        .plan-btn {
            background: #FFF7ED;
            color: #D97706;
            border: 1px solid #FFEDD5;
            border-radius: 99px;
            padding: 6px 12px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            transition: all 0.2s;
            width: fit-content;
        }
        .plan-btn:hover { background: #FFEDD5; }
        .plan-btn:active { transform: scale(0.95); }

        /* =========================================
           2. 目标设置弹窗 (Modal)
           ========================================= */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4); backdrop-filter: blur(5px);
            z-index: 999;
            display: flex; justify-content: center; align-items: flex-end; /* 底部弹出 */
            opacity: 0; visibility: hidden; transition: all 0.3s;
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }

        .modal-card {
            background: #ffffff;
            width: 100%; max-width: 420px;
            border-top-left-radius: 32px; border-top-right-radius: 32px;
            padding: 24px;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.1);
            transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            max-height: 85vh;
            display: flex; flex-direction: column;
        }
        .modal-overlay.active .modal-card { transform: translateY(0); }

        /* 弹窗头部 */
        .modal-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; flex-shrink: 0;
        }
        .modal-title { font-size: 18px; font-weight: 800; color: #1F2937; }
        .modal-subtitle { font-size: 12px; color: #9CA3AF; margin-top: 2px; }
        .close-btn {
            background: #F3F4F6; border: none; width: 32px; height: 32px; border-radius: 50%;
            font-size: 20px; color: #6B7280; display: flex; align-items: center; justify-content: center; cursor: pointer;
        }

        /* 滚动区域：输入网格 */
        .goals-scroll-area {
            overflow-y: auto;
            flex-grow: 1;
            padding-bottom: 20px;
            /* 隐藏滚动条 */
            scrollbar-width: none; -ms-overflow-style: none;
        }
        .goals-scroll-area::-webkit-scrollbar { display: none; }

        .goals-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 2列布局 */
            gap: 12px;
        }

        /* 单个输入卡片 */
        .goal-item {
            background: #F9FAFB;
            border-radius: 16px;
            padding: 12px;
            border: 1px solid transparent;
            transition: all 0.2s;
        }
        .goal-item:focus-within {
            background: #fff;
            border-color: #8B5CF6;
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.1);
        }

        .goal-label {
            display: flex; align-items: center; gap: 6px;
            font-size: 13px; font-weight: 600; color: #4B5563;
            margin-bottom: 8px;
        }
        /* 各类别的图标底色 */
        .icon-box {
            width: 24px; height: 24px; border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px;
        }
        /* 颜色主题 */
        .theme-red { background: #FEF2F2; color: #EF4444; }
        .theme-blue { background: #EFF6FF; color: #3B82F6; }
        .theme-purple { background: #F3F0FF; color: #8B5CF6; }
        .theme-orange { background: #FFF7ED; color: #F97316; }
        .theme-green { background: #ECFDF5; color: #10B981; }

        /* 输入框样式 */
        .goal-input-group {
            display: flex; align-items: center;
            background: white;
            border: 1px solid #E5E7EB;
            border-radius: 8px;
            padding: 0 8px;
            height: 36px;
        }
        .goal-input {
            width: 100%; border: none; outline: none;
            font-size: 16px; font-weight: 700; color: #1F2937;
            text-align: right; /* 数字靠右 */
        }
        .goal-unit { font-size: 12px; color: #9CA3AF; margin-left: 4px; }

        /* 底部保存按钮 */
        .save-btn {
            margin-top: 15px;
            width: 100%;
            background: linear-gradient(135deg, #8B5CF6, #6D28D9);
            color: white; border: none; padding: 14px; border-radius: 99px;
            font-size: 16px; font-weight: 700; cursor: pointer;
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.3);
            flex-shrink: 0;
        }
        .save-btn:active { transform: scale(0.98); }

    </style>
</head>
<body>

<div class="mobile-container">
    
    <div class="stats-row">
        
        <div class="stat-card done">
            <div class="card-head">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                本月已完成
            </div>
            <div>
                <span class="card-num">824</span><span class="num-unit">单</span>
            </div>
        </div>

        <div class="stat-card pending">
            <div class="card-head">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                本月待完成
            </div>
            <div style="display: flex; align-items: flex-end; justify-content: space-between;">
                <div>
                    <span class="card-num">4,120</span><span class="num-unit">单</span>
                </div>
                <button class="plan-btn" onclick="openModal()">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                    制定计划
                </button>
            </div>
        </div>

    </div>

</div>

<div class="modal-overlay" id="planModal" onclick="closeModal(event)">
    <div class="modal-card" onclick="event.stopPropagation()">
        
        <div class="modal-header">
            <div>
                <div class="modal-title">设定月度目标 🎯</div>
                <div class="modal-subtitle">请设置各个板块的营销数字目标</div>
            </div>
            <button class="close-btn" onclick="closeModalDirect()">×</button>
        </div>

        <div class="goals-scroll-area">
            <div class="goals-grid">
                
                <div class="goal-item">
                    <div class="goal-label">
                        <div class="icon-box theme-red">🏛️</div> 考公
                    </div>
                    <div class="goal-input-group">
                        <input type="number" class="goal-input" value="100">
                        <span class="goal-unit">单</span>
                    </div>
                </div>

                <div class="goal-item">
                    <div class="goal-label">
                        <div class="icon-box theme-orange">📜</div> 考编
                    </div>
                    <div class="goal-input-group">
                        <input type="number" class="goal-input" placeholder="0">
                        <span class="goal-unit">单</span>
                    </div>
                </div>

                <div class="goal-item">
                    <div class="goal-label">
                        <div class="icon-box theme-purple">📚</div> 考研
                    </div>
                    <div class="goal-input-group">
                        <input type="number" class="goal-input" placeholder="0">
                        <span class="goal-unit">单</span>
                    </div>
                </div>

                <div class="goal-item">
                    <div class="goal-label">
                        <div class="icon-box theme-blue">💼</div> 就业
                    </div>
                    <div class="goal-input-group">
                        <input type="number" class="goal-input" placeholder="0">
                        <span class="goal-unit">单</span>
                    </div>
                </div>

                <div class="goal-item">
                    <div class="goal-label">
                        <div class="icon-box theme-purple">🔠</div> 四六级
                    </div>
                    <div class="goal-input-group">
                        <input type="number" class="goal-input" placeholder="0">
                        <span class="goal-unit">单</span>
                    </div>
                </div>

                <div class="goal-item">
                    <div class="goal-label">
                        <div class="icon-box theme-green">🚗</div> 驾校
                    </div>
                    <div class="goal-input-group">
                        <input type="number" class="goal-input" placeholder="0">
                        <span class="goal-unit">单</span>
                    </div>
                </div>

                <div class="goal-item">
                    <div class="goal-label">
                        <div class="icon-box theme-purple">🪪</div> 考证
                    </div>
                    <div class="goal-input-group">
                        <input type="number" class="goal-input" placeholder="0">
                        <span class="goal-unit">单</span>
                    </div>
                </div>

                <div class="goal-item">
                    <div class="goal-label">
                        <div class="icon-box theme-orange">👩‍🏫</div> 教资
                    </div>
                    <div class="goal-input-group">
                        <input type="number" class="goal-input" placeholder="0">
                        <span class="goal-unit">单</span>
                    </div>
                </div>

                <div class="goal-item">
                    <div class="goal-label">
                        <div class="icon-box theme-blue">🎓</div> 专升本
                    </div>
                    <div class="goal-input-group">
                        <input type="number" class="goal-input" placeholder="0">
                        <span class="goal-unit">单</span>
                    </div>
                </div>

                <div class="goal-item">
                    <div class="goal-label">
                        <div class="icon-box theme-green">🛠️</div> 勤工
                    </div>
                    <div class="goal-input-group">
                        <input type="number" class="goal-input" placeholder="0">
                        <span class="goal-unit">单</span>
                    </div>
                </div>

                <div class="goal-item">
                    <div class="goal-label">
                        <div class="icon-box theme-blue">📈</div> 升学
                    </div>
                    <div class="goal-input-group">
                        <input type="number" class="goal-input" placeholder="0">
                        <span class="goal-unit">单</span>
                    </div>
                </div>

                <div class="goal-item">
                    <div class="goal-label">
                        <div class="icon-box theme-blue">💻</div> 计算机
                    </div>
                    <div class="goal-input-group">
                        <input type="number" class="goal-input" placeholder="0">
                        <span class="goal-unit">单</span>
                    </div>
                </div>

                 <div class="goal-item">
                    <div class="goal-label">
                        <div class="icon-box theme-red">🛏️</div> 棉被
                    </div>
                    <div class="goal-input-group">
                        <input type="number" class="goal-input" placeholder="0">
                        <span class="goal-unit">单</span>
                    </div>
                </div>

                 <div class="goal-item">
                    <div class="goal-label">
                        <div class="icon-box theme-red">🚀</div> 新人
                    </div>
                    <div class="goal-input-group">
                        <input type="number" class="goal-input" placeholder="0">
                        <span class="goal-unit">人</span>
                    </div>
                </div>

            </div>
        </div>

        <button class="save-btn" onclick="saveGoals(this)">保存计划</button>
    </div>
</div>

<script>
    function openModal() {
        document.getElementById('planModal').classList.add('active');
    }

    function closeModal(event) {
        document.getElementById('planModal').classList.remove('active');
    }

    function closeModalDirect() {
        document.getElementById('planModal').classList.remove('active');
    }

    function saveGoals(btn) {
        const originalText = btn.innerText;
        btn.innerText = "已保存 ✓";
        btn.style.background = "#10B981"; // 变绿
        
        setTimeout(() => {
            closeModalDirect();
            // 恢复按钮样式
            setTimeout(() => {
                btn.innerText = originalText;
                btn.style.background = "linear-gradient(135deg, #8B5CF6, #6D28D9)";
            }, 300);
        }, 800);
    }
</script>

</body>
</html>
