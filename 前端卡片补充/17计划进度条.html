<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>目标进度条小组件</title>
    <style>
        /* --- 全局设置 --- */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: #F8F7FC; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }

        /* --- 组件容器 --- */
        .progress-card {
            background: #ffffff;
            width: 100%;
            max-width: 340px;
            border-radius: 24px; /* 大圆角 */
            padding: 20px 24px;
            box-shadow: 0 10px 30px rgba(139, 92, 246, 0.08);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* 1. 顶部：标题 + 百分比 */
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end; /* 底部对齐 */
        }

        .header-left {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .card-title { font-size: 13px; color: #6B7280; font-weight: 600; }
        .card-subtitle { font-size: 11px; color: #9CA3AF; }

        .percent-text {
            font-size: 32px;
            font-weight: 800;
            color: #7C3AED;
            line-height: 1;
            letter-spacing: -1px;
        }
        .percent-symbol { font-size: 16px; font-weight: 600; color: #A78BFA; margin-left: 2px; }

        /* 2. 进度条轨道 */
        .progress-track {
            width: 100%;
            height: 12px;
            background-color: #F3F4F6;
            border-radius: 99px;
            overflow: hidden; /* 保证内部填充也圆角 */
            position: relative;
        }

        /* 进度条填充 (带动画) */
        .progress-fill {
            height: 100%;
            width: 85%; /* 这里控制进度 */
            background: linear-gradient(90deg, #A78BFA, #7C3AED);
            border-radius: 99px;
            position: relative;
            /* 增加一点条纹纹理 */
            background-image: linear-gradient(45deg,rgba(255,255,255,.15) 25%,transparent 25%,transparent 50%,rgba(255,255,255,.15) 50%,rgba(255,255,255,.15) 75%,transparent 75%,transparent);
            background-size: 20px 20px;
        }

        /* 3. 底部数据：已完成 vs 总任务 */
        .stats-row {
            display: flex;
            justify-content: space-between;
            margin-top: 5px;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .stat-label {
            font-size: 11px;
            color: #9CA3AF;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        /* 小圆点指示器 */
        .dot { width: 6px; height: 6px; border-radius: 50%; }
        .dot.done { background: #7C3AED; }
        .dot.total { background: #E5E7EB; }

        .stat-num {
            font-size: 16px;
            font-weight: 700;
            color: #1F2937;
            padding-left: 10px; /* 对齐上面的文字 */
        }
        
        .stat-num.highlight { color: #7C3AED; }

    </style>
</head>
<body>

    <div class="progress-card">
        
        <div class="card-header">
            <div class="header-left">
                <div class="card-title">本月目标进度</div>
                <div class="card-subtitle">剩余时间 12 天</div>
            </div>
            <div class="percent-text">
                85<span class="percent-symbol">%</span>
            </div>
        </div>

        <div class="progress-track">
            <div class="progress-fill" style="width: 85%;"></div>
        </div>

        <div class="stats-row">
            <div class="stat-item">
                <div class="stat-label">
                    <span class="dot done"></span> 已完成
                </div>
                <div class="stat-num highlight">4,120</div>
            </div>

            <div class="stat-item" style="align-items: flex-end;">
                <div class="stat-label">
                    总任务 <span class="dot total"></span>
                </div>
                <div class="stat-num" style="padding-left:0; padding-right: 10px;">5,000</div>
            </div>
        </div>

    </div>

</body>
</html>
