<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本月重点计划 To-Do</title>
    <style>
        /* --- 全局设置 --- */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #F8F7FC; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }

        /* --- 组件容器 --- */
        .plan-todo-card {
            background: #ffffff;
            width: 100%;
            max-width: 360px;
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(139, 92, 246, 0.08);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* 1. 头部标题 */
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-left: 4px;
        }

        .header-title {
            font-size: 16px;
            font-weight: 800;
            color: #1F2937;
            display: flex; align-items: center; gap: 6px;
        }
        
        /* 装饰小图标 */
        .header-icon { color: #F59E0B; width: 18px; height: 18px; }

        .header-date {
            font-size: 12px;
            color: #9CA3AF;
            background: #F3F4F6;
            padding: 4px 8px;
            border-radius: 6px;
            font-weight: 500;
        }

        /* 2. 计划列表 */
        .todo-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* 单个计划项 */
        .todo-item {
            display: flex;
            align-items: center;
            padding: 12px;
            background: #FAFAFA;
            border: 1px solid transparent;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .todo-item:hover {
            background: #F3F0FF; /* 悬停微紫 */
            transform: translateY(-1px);
        }

        .todo-item:active { transform: scale(0.98); }

        /* 左侧：业务图标圆底 */
        .item-icon-box {
            width: 36px; height: 36px;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            margin-right: 12px;
            transition: all 0.3s;
        }
        
        /* 颜色主题 */
        .theme-green { background: #ECFDF5; color: #10B981; }
        .theme-purple { background: #F3F0FF; color: #8B5CF6; }
        .theme-red { background: #FEF2F2; color: #EF4444; }

        .item-icon-box svg { width: 18px; height: 18px; stroke-width: 2; }

        /* 中间：文字信息 */
        .item-content { flex-grow: 1; display: flex; flex-direction: column; gap: 3px; }
        
        .item-title { font-size: 14px; font-weight: 700; color: #374151; transition: color 0.3s; }
        
        /* 目标胶囊 */
        .target-pill {
            font-size: 11px;
            color: #6B7280;
            display: flex; align-items: center; gap: 4px;
        }
        .target-num { color: #7C3AED; font-weight: 700; }

        /* 右侧：复选框 */
        .checkbox {
            width: 22px; height: 22px;
            border-radius: 50%;
            border: 2px solid #D1D5DB;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            transition: all 0.3s;
            background: white;
        }

        .checkbox svg { 
            width: 14px; height: 14px; 
            color: white; 
            opacity: 0; transform: scale(0.5); 
            transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1); 
        }

        /* --- 已完成状态 (Checked) --- */
        .todo-item.checked {
            background: #F9FAFB; /* 变灰 */
            opacity: 0.8;
        }

        /* 图标变灰 */
        .todo-item.checked .item-icon-box {
            background: #E5E7EB; color: #9CA3AF;
            filter: grayscale(100%);
        }

        /* 文字删除线 */
        .todo-item.checked .item-title {
            color: #9CA3AF;
            text-decoration: line-through;
        }
        .todo-item.checked .target-pill { opacity: 0.6; }

        /* 复选框变绿 */
        .todo-item.checked .checkbox {
            background: #10B981;
            border-color: #10B981;
        }
        .todo-item.checked .checkbox svg {
            opacity: 1; transform: scale(1);
        }

    </style>
</head>
<body>

    <div class="plan-todo-card">
        
        <div class="card-header">
            <div class="header-title">
                <svg class="header-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M14.4 6L14 4H5v17h2v-7h5.6l.4 2h7V6z"/></svg>
                本月重点计划
            </div>
            <div class="header-date">12月</div>
        </div>

        <div class="todo-list">

            <div class="todo-item" onclick="toggleTodo(this)">
                <div class="item-icon-box theme-green">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.5 16c-.83 0-1.5-.67-1.5-1.5S5.67 13 6.5 13s1.5.67 1.5 1.5S7.33 16 6.5 16zm11 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM5 11l1.5-4.5h11L19 11H5z"/></svg>
                </div>
                <div class="item-content">
                    <div class="item-title">驾校报名</div>
                    <div class="target-pill">
                        目标 <span class="target-num">10</span> 单
                    </div>
                </div>
                <div class="checkbox">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                </div>
            </div>

            <div class="todo-item" onclick="toggleTodo(this)">
                <div class="item-icon-box theme-purple">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
                </div>
                <div class="item-content">
                    <div class="item-title">考研菁英</div>
                    <div class="target-pill">
                        目标 <span class="target-num">5</span> 单
                    </div>
                </div>
                <div class="checkbox">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                </div>
            </div>

            <div class="todo-item" onclick="toggleTodo(this)">
                <div class="item-icon-box theme-red">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"></path><path d="m12 15-3-3a22 22 0 0 1 2-7 24 24 0 0 1 7 7c0 2-3 3-3 3"></path><polyline points="15 12 12 15 9 12"></polyline></svg>
                </div>
                <div class="item-content">
                    <div class="item-title">新人拉新</div>
                    <div class="target-pill">
                        目标 <span class="target-num">20</span> 人
                    </div>
                </div>
                <div class="checkbox">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                </div>
            </div>

        </div>

    </div>

    <script>
        function toggleTodo(el) {
            // 切换 .checked 类，触发CSS动画
            el.classList.toggle('checked');
        }
    </script>

</body>
</html>
