<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>签到卡片 - 数字核心版</title>
    <style>
        /* --- 全局设置 --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #F8F7FC;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* --- 卡片容器 --- */
        .checkin-card {
            background: #ffffff;
            width: 100%;
            max-width: 380px;
            height: 76px; /* 扁平高度 */
            border-radius: 999px; /* 胶囊形状 */
            padding: 0 12px 0 28px; /* 左侧留白，右侧留给按钮 */
            
            display: flex;
            justify-content: space-between; /* 左右分布 */
            align-items: center;
            
            box-shadow: 
                0 10px 25px rgba(139, 92, 246, 0.08), 
                0 2px 6px rgba(139, 92, 246, 0.02),
                inset 0 0 0 1px rgba(255, 255, 255, 0.5);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        /* --- 左侧：数字区域 --- */
        .info-group {
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: all 0.4s ease;
        }

        .streak-label {
            font-size: 11px;
            color: #8B5CF6;
            font-weight: 600;
            margin-bottom: 2px;
            display: flex;
            align-items: center;
            gap: 4px;
            opacity: 1;
            transition: opacity 0.3s;
        }

        .streak-label svg {
            width: 12px; height: 12px; stroke: currentColor; stroke-width: 2.5; fill: none;
        }

        .count-wrapper {
            display: flex;
            align-items: baseline;
        }

        .count-num {
            font-size: 26px;
            font-weight: 900;
            color: #4C1D95; /* 深紫色 */
            line-height: 1;
            margin-right: 4px;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); /* 弹性动画 */
            transform-origin: left center; /* 从左侧开始放大 */
        }

        .count-unit {
            font-size: 13px;
            color: #7C3AED;
            font-weight: 500;
            transition: color 0.3s;
        }

        /* --- 右侧：按钮区域 --- */
        .btn-wrapper {
            /* 容器用于定位变化 */
            display: flex;
            align-items: center;
            justify-content: flex-end;
        }

        .btn-checkin {
            height: 52px;
            padding: 0 24px;
            border: none;
            border-radius: 999px;
            
            /* 初始状态：醒目的紫色渐变按钮 */
            background: linear-gradient(135deg, #8B5CF6, #6D28D9);
            color: white;
            
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(124, 58, 237, 0.3);
            
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.4s ease;
        }

        .btn-checkin svg {
            width: 16px; height: 16px; stroke: currentColor; stroke-width: 2; fill: none;
        }

        .btn-checkin:active { transform: scale(0.96); }

        /* =========================================
           ✨ 签到成功后的状态样式 ✨
           ========================================= */
        
        /* 1. 卡片整体微调 */
        .checkin-card.success {
            background: #F0FDF4; /* 极淡的绿色背景，增加氛围 */
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.08); /* 绿色投影 */
        }

        /* 2. 按钮 -> 变成普通文字标签 */
        .checkin-card.success .btn-checkin {
            background: transparent; /* 去掉背景 */
            box-shadow: none; /* 去掉阴影 */
            color: #059669; /* 变成深绿色字 */
            padding: 0 10px; /* 减小内边距 */
            height: auto; /* 高度自适应 */
            cursor: default; /* 不可点击 */
            font-size: 12px; /* 文字变小 */
        }
        
        .checkin-card.success .btn-text {
            /* 文字内容会在JS中替换，这里控制样式 */
            font-weight: 600;
        }

        /* 3. 数字 -> 变大、变绿、突出显示 */
        .checkin-card.success .count-num {
            font-size: 36px; /* 字体明显变大 */
            color: #059669; /* 绿色 */
            transform: translateY(-2px); /* 微微上浮 */
        }

        .checkin-card.success .count-unit {
            color: #10B981;
            font-size: 14px;
        }
        
        .checkin-card.success .streak-label {
            color: #10B981;
            /* 也可以选择隐藏上面的小标签，让数字更纯粹，看您喜好 */
            /* opacity: 0; */ 
        }

    </style>
</head>
<body>

    <div class="checkin-card" id="cardContainer">
        
        <div class="info-group">
            <div class="streak-label">
                <svg viewBox="0 0 24 24"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.1.2-2.2.6-3a5.4 5.4 0 0 0 .9 2.5z"></path></svg>
                连续签到
            </div>
            <div class="count-wrapper">
                <span class="count-num" id="dayCount">12</span>
                <span class="count-unit">天</span>
            </div>
        </div>

        <div class="btn-wrapper">
            <button class="btn-checkin" id="checkinBtn" onclick="doCheckIn()">
                <svg class="icon-svg" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                <span class="btn-text">立即签到</span>
            </button>
        </div>

    </div>

    <script>
        let isChecked = false;
        const btn = document.getElementById('checkinBtn');
        const btnText = btn.querySelector('.btn-text');
        const iconSvg = btn.querySelector('.icon-svg');
        const dayCount = document.getElementById('dayCount');
        const cardContainer = document.getElementById('cardContainer');

        function doCheckIn() {
            if(isChecked) return;

            // 1. 添加状态类：这一步会触发 CSS 的一系列变化
            cardContainer.classList.add('success');

            // 2. 修改右侧文字内容和图标
            btnText.innerText = "今日已签到";
            // 替换 SVG 为对勾
            btn.innerHTML = `
                <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
                <span class="btn-text">今日已签到</span>
            `;

            // 3. 数字逻辑
            let currentVal = parseInt(dayCount.innerText);
            
            // 为了让动画更自然，我们做一个简单的数字跳动
            dayCount.style.transform = "scale(0.8)"; // 先缩小
            setTimeout(() => {
                dayCount.innerText = currentVal + 1;
                dayCount.style.transform = "scale(1)"; // 再放大回正常（此时CSS里的font-size变大了）
            }, 100);

            isChecked = true;
        }
    </script>
</body>
</html>
