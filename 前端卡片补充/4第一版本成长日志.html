<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成长日志 - 编辑与历史</title>
    <style>
        /* --- 全局样式 --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            outline: none;
        }

        body {
            background-color: #F3F0FF; /* 极淡紫背景 */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* 容器：用于定位切换 */
        .app-container {
            width: 100%;
            max-width: 400px;
            position: relative;
        }

        /* --- 通用卡片外壳 --- */
        .card {
            background: #ffffff;
            width: 100%;
            padding: 25px;
            border-radius: 32px;
            box-shadow: 
                0 20px 40px rgba(139, 92, 246, 0.08),
                0 0 0 1px rgba(255, 255, 255, 0.8) inset;
            display: flex;
            flex-direction: column;
            gap: 20px;
            /* 动画过渡 */
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 隐藏状态 */
        .hidden {
            display: none;
            opacity: 0;
            transform: scale(0.95);
        }

        /* --- 顶部 Header --- */
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }

        .card-title {
            font-size: 20px;
            font-weight: 800;
            color: #4C1D95;
            letter-spacing: -0.5px;
        }

        /* 顶部按钮群 */
        .header-actions {
            display: flex;
            gap: 10px;
        }

        /* 幽灵按钮 (用于历史/返回) */
        .icon-btn {
            background: #F5F3FF;
            color: #7C3AED;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 16px;
        }
        .icon-btn:hover {
            background: #EDE9FE;
            color: #5B21B6;
        }

        /* 主操作按钮 (保存) */
        .primary-btn {
            background: linear-gradient(135deg, #8B5CF6, #7C3AED);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 999px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 10px rgba(139, 92, 246, 0.3);
        }
        .primary-btn:hover { transform: translateY(-2px); }
        .primary-btn:active { transform: scale(0.95); }

        /* --- 编辑页样式 --- */
        .section-label {
            font-size: 13px;
            color: #6D28D9;
            font-weight: 700;
            padding-left: 5px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .dot {
            width: 6px;
            height: 6px;
            background-color: #C4B5FD;
            border-radius: 50%;
        }
        .input-area {
            width: 100%;
            background-color: #F5F3FF;
            border: 2px solid transparent;
            border-radius: 18px;
            padding: 15px;
            font-size: 14px;
            color: #4B5563;
            line-height: 1.5;
            resize: none;
            transition: all 0.3s ease;
        }
        .input-area:focus {
            background-color: #fff;
            border-color: #A78BFA;
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.1);
        }

        /* --- 历史页样式 --- */
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 5px;
        }
        
        /* 滚动条美化 */
        .history-list::-webkit-scrollbar { width: 4px; }
        .history-list::-webkit-scrollbar-thumb { background: #DDD6FE; border-radius: 4px; }

        /* 单个历史条目 */
        .history-item {
            display: flex;
            gap: 15px;
            align-items: stretch;
        }

        /* 左侧日期胶囊 */
        .date-capsule {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #EDE9FE;
            color: #6D28D9;
            min-width: 50px;
            border-radius: 16px;
            padding: 10px 5px;
            flex-shrink: 0;
            height: auto;
        }
        .date-day { font-size: 18px; font-weight: 800; line-height: 1; }
        .date-month { font-size: 10px; font-weight: 600; margin-top: 2px; opacity: 0.8; }

        /* 右侧内容气泡 */
        .content-bubble {
            flex-grow: 1;
            background: #FAFAFA;
            border: 1px solid #F3F4F6;
            border-radius: 20px;
            padding: 12px 15px;
            font-size: 13px;
            color: #4B5563;
            line-height: 1.5;
            transition: all 0.2s;
            cursor: pointer;
        }
        
        .content-bubble:hover {
            background: #F5F3FF;
            border-color: #DDD6FE;
        }

        .preview-text {
            display: -webkit-box;
            -webkit-line-clamp: 2; /* 最多显示2行 */
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .tag-row {
            margin-top: 6px;
            display: flex;
            gap: 6px;
        }
        
        .mini-tag {
            font-size: 10px;
            background: #E5E7EB;
            color: #6B7280;
            padding: 2px 8px;
            border-radius: 99px;
        }
        .mini-tag.done { background: #D1FAE5; color: #059669; }

    </style>
</head>
<body>

<div class="app-container">
    
    <div class="card" id="editorCard">
        <div class="card-header">
            <div class="card-title">成长日志 📝</div>
            <div class="header-actions">
                <button class="icon-btn" onclick="switchView('history')" title="查看历史">
                    ↺
                </button>
                <button class="primary-btn" onclick="saveLog(this)">保存</button>
            </div>
        </div>

        <div>
            <div class="section-label"><span class="dot"></span> 今日进展与成果</div>
            <textarea class="input-area" style="height: 80px;" placeholder="今天做成了什么? 成交了谁?"></textarea>
        </div>
        <div>
            <div class="section-label"><span class="dot"></span> 困难与思考</div>
            <textarea class="input-area" style="height: 80px;" placeholder="遇到的卡点、复盘..."></textarea>
        </div>
        <div>
            <div class="section-label"><span class="dot"></span> 明日计划</div>
            <textarea class="input-area" style="height: 60px;" placeholder="最重要的 2~3 件事"></textarea>
        </div>
    </div>

    <div class="card hidden" id="historyCard">
        <div class="card-header">
            <button class="icon-btn" onclick="switchView('editor')" style="margin-right: 10px;">
                ←
            </button>
            <div class="card-title" style="flex-grow: 1;">过往足迹 👣</div>
        </div>

        <div class="history-list">
            
            <div class="history-item">
                <div class="date-capsule">
                    <span class="date-day">14</span>
                    <span class="date-month">12月</span>
                </div>
                <div class="content-bubble">
                    <div class="preview-text">完成了官网首页的第二版设计，客户确认了紫色系的配色方案。复盘发现上午效率最高。</div>
                    <div class="tag-row">
                        <span class="mini-tag done">进展顺利</span>
                    </div>
                </div>
            </div>

            <div class="history-item">
                <div class="date-capsule" style="background-color: #F3F4F6; color:#6B7280;">
                    <span class="date-day">13</span>
                    <span class="date-month">12月</span>
                </div>
                <div class="content-bubble">
                    <div class="preview-text">处理了服务器宕机的问题，虽然耗时3小时，但学会了新的排查流程。晚上阅读了30分钟。</div>
                </div>
            </div>

            <div class="history-item">
                <div class="date-capsule" style="background-color: #F3F4F6; color:#6B7280;">
                    <span class="date-day">12</span>
                    <span class="date-month">12月</span>
                </div>
                <div class="content-bubble">
                    <div class="preview-text">与A客户进行了深度沟通，确定了明年的合作意向。感觉沟通技巧还需要提升，尤其是倾听方面。</div>
                </div>
            </div>
             <div class="history-item">
                <div class="date-capsule" style="background-color: #F3F4F6; color:#6B7280;">
                    <span class="date-day">10</span>
                    <span class="date-month">12月</span>
                </div>
                <div class="content-bubble">
                    <div class="preview-text">全天专注于代码重构，删除了冗余的CSS样式，项目体积减少了20%。</div>
                </div>
            </div>

        </div>
    </div>

</div>

<script>
    const editorCard = document.getElementById('editorCard');
    const historyCard = document.getElementById('historyCard');

    function switchView(viewName) {
        if (viewName === 'history') {
            editorCard.classList.add('hidden');
            // 短暂延迟后显示，让动画更顺滑
            setTimeout(() => {
                editorCard.style.display = 'none';
                historyCard.style.display = 'flex';
                // 强制重绘
                setTimeout(() => historyCard.classList.remove('hidden'), 20);
            }, 200); // 配合 CSS transition 时间
        } else {
            historyCard.classList.add('hidden');
            setTimeout(() => {
                historyCard.style.display = 'none';
                editorCard.style.display = 'flex';
                setTimeout(() => editorCard.classList.remove('hidden'), 20);
            }, 200);
        }
    }

    function saveLog(btn) {
        const originalText = btn.innerText;
        btn.innerText = "已保存";
        btn.style.background = "#10B981"; 
        
        setTimeout(() => {
            btn.innerText = originalText;
            btn.style.background = "linear-gradient(135deg, #8B5CF6, #7C3AED)";
        }, 2000);
    }
</script>

</body>
</html>
