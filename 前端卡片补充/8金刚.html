<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>清爽金刚区 - 精致SVG版</title>
    <style>
        /* --- 全局设置 --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #F8F7FC;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .mobile-container {
            width: 100%;
            max-width: 400px;
        }

        /* --- 栅格布局 --- */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px; /* 间隙稍微减小 */
            padding-bottom: 20px;
        }

        /* --- 单个卡片样式 (更紧凑) --- */
        .nav-card {
            background: #ffffff;
            border-radius: 18px; /* 圆角稍微改小一点点以匹配尺寸 */
            padding: 14px 5px; /* 减少内边距 */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02), 
                        0 0 0 1px rgba(0, 0, 0, 0.01); 
            transition: all 0.2s ease;
        }

        .nav-card:active {
            transform: scale(0.96);
            background-color: #FAFAFA;
        }

        /* --- 核心：淡雅圆底区域 (尺寸缩小) --- */
        .icon-circle {
            width: 38px; /* 缩小尺寸 */
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 8px; /* 减少底部间距 */
            transition: transform 0.2s;
        }
        
        /* SVG 图标通用样式 */
        .icon-circle svg {
            width: 20px; /* 控制图标大小 */
            height: 20px;
            stroke-width: 2; /* 线条粗细 */
            stroke: currentColor; /* 跟随文字颜色 */
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .nav-card:hover .icon-circle {
            transform: translateY(-2px);
        }

        /* --- 文字区域 (字号微调) --- */
        .main-title {
            font-size: 14px; /* 字号稍微减小 */
            font-weight: 700;
            color: #333333;
            margin-bottom: 3px;
            letter-spacing: 0.3px;
        }

        .sub-title {
            font-size: 10px; /* 字号减小 */
            color: #999999;
            font-weight: 400;
        }

        /* --- 颜色主题 --- */
        .theme-red { background-color: #FEF2F2; color: #EF4444; }
        .theme-purple { background-color: #F3F0FF; color: #8B5CF6; }
        .theme-blue { background-color: #EFF6FF; color: #3B82F6; }
        .theme-green { background-color: #ECFDF5; color: #10B981; }
        .theme-orange { background-color: #FFF7ED; color: #F97316; }
        .theme-pink { background-color: #FDF2F8; color: #EC4899; }
        .theme-cyan { background-color: #ECFEFF; color: #06B6D4; }

    </style>
</head>
