<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园论坛</title>
    <style>
        :root {
            --primary-yellow: #fdd835;
            --text-gray: #666;
            --light-bg: #f5f5f5;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #eee;
        }

        /* 容器限制在手机尺寸 */
        .app-container {
            max-width: 450px;
            margin: 0 auto;
            background-color: white;
            min-height: 100vh;
            position: relative;
        }

        /* 顶部导航 */
        header {
            padding: 15px;
            border-bottom: 1px solid #eee;
            position: sticky;
            top: 0;
            background: white;
            z-index: 10;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .school-selector {
            display: flex;
            align-items: center;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
        }

        .school-selector .arrow {
            color: #ff5722;
            margin-right: 8px;
            font-size: 24px;
        }

        .forum-title {
            color: #333;
            font-weight: bold;
            font-size: 18px;
        }

        .tabs {
            display: flex;
            gap: 30px;
            font-size: 18px;
        }

        .tab {
            position: relative;
            cursor: pointer;
            color: #999;
        }

        .tab.active {
            color: #000;
            font-weight: bold;
        }

        .tab.active::after {
            content: "";
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            width: 15px;
            height: 4px;
            background-color: var(--primary-yellow);
            border-radius: 2px;
        }

        /* 帖子列表 */
        .post-card {
            padding: 15px;
            border-bottom: 8px solid var(--light-bg);
        }

        .user-info {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .user-meta {
            display: flex;
            gap: 10px;
        }

        .avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background-color: #ddd;
        }

        .username {
            font-weight: bold;
            font-size: 15px;
        }

        .school-name {
            font-size: 12px;
            color: #bbb;
            margin-top: 2px;
        }

        .post-time {
            font-size: 12px;
            color: #ccc;
        }

        .post-body {
            display: flex;
            margin-top: 10px;
            gap: 15px;
        }

        .post-content {
            flex: 1;
            font-size: 15px;
            line-height: 1.5;
            color: #333;
        }

        .post-image {
            width: 90px;
            height: 90px;
            border-radius: 8px;
            object-fit: cover;
            background-color: #f0f0f0;
        }

        .post-tag {
            display: inline-block;
            margin-top: 12px;
            font-size: 13px;
            color: #ffb300;
            cursor: pointer;
        }

        /* 底部操作栏 */
        .actions {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            color: #999;
            font-size: 13px;
        }

        .action-btns {
            display: flex;
            gap: 20px;
        }

        .action-item {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }

        /* 弹窗样式 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .modal {
            background: white;
            width: 80%;
            max-width: 300px;
            border-radius: 15px;
            padding: 20px;
        }

        .modal h3 {
            margin-top: 0;
            text-align: center;
        }

        .school-list {
            max-height: 150px;
            overflow-y: auto;
            margin: 15px 0;
        }

        .school-item {
            padding: 10px;
            border-bottom: 1px solid #f5f5f5;
            cursor: pointer;
        }

        .admin-section {
            border-top: 1px solid #eee;
            padding-top: 15px;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            box-sizing: border-box;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        .btn {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .btn-primary {
            background: #ff5722;
            color: white;
        }

        .btn-cancel {
            background: transparent;
            color: #999;
            margin-top: 5px;
        }
    </style>
</head>

<body>

    <div class="app-container">
        <header>
            <div class="top-bar">
                <div class="school-selector" onclick="openModal()">
                    <span class="arrow">⇄</span>
                    <span id="current-school-display">云南大学</span>
                </div>
                <div class="forum-title">校园论坛</div>
            </div>
            <div class="tabs">
                <div class="tab active">本校</div>
                <div class="tab">热门</div>
            </div>
        </header>

        <div id="post-list">
        </div>
    </div>

    <div class="modal-overlay" id="modal">
        <div class="modal">
            <h3>选择学校</h3>
            <div class="school-list" id="school-list-container">
            </div>

            <div class="admin-section">
                <p style="font-size: 12px; color: #999;">添加新学校 (需密码)</p>
                <input type="password" id="admin-pwd" placeholder="管理员密码 (提示: 123)">
                <input type="text" id="new-school-name" placeholder="新学校名称">
                <button class="btn btn-primary" onclick="handleAddSchool()">验证并添加</button>
            </div>
            <button class="btn btn-cancel" onclick="closeModal()">取消</button>
        </div>
    </div>

    <script>
        // 模拟数据
        let schools = ["云南大学", "清华大学", "北京大学", "复旦大学"];
        let posts = [
            {
                user: "Joy左伊",
                school: "清华大学",
                content: "Summer的打分功能真的太好玩了吧，大家一起来吹彩虹屁！",
                tag: "打分",
                time: "10:28",
                likes: 562,
                comments: 956,
                img: "https://picsum.photos/100/100?random=1"
            },
            {
                user: "白白是我",
                school: "北京大学",
                content: "有没有周末想要一起去看电影的同学啊，听说最近的几部片子都不错...",
                tag: "约玩",
                time: "08:56",
                likes: 341,
                comments: 892,
                img: "https://picsum.photos/100/100?random=2"
            }
        ];

        // 初始化渲染
        function init() {
            renderPosts();
            renderSchools();
        }

        function renderPosts() {
            const container = document.getElementById('post-list');
            container.innerHTML = posts.map((post, index) => `
            <div class="post-card">
                <div class="user-info">
                    <div class="user-meta">
                        <img src="https://api.dicebear.com/7.x/beta/svg?seed=${post.user}" class="avatar">
                        <div>
                            <div class="username">${post.user}</div>
                            <div class="school-name">${post.school}</div>
                        </div>
                    </div>
                    <div class="post-time">${post.time}</div>
                </div>
                <div class="post-body">
                    <div class="post-content">
                        ${post.content}
                        <div class="post-tag">🟡 ${post.tag} ></div>
                    </div>
                    <img src="${post.img}" class="post-image">
                </div>
                <div class="actions">
                    <div class="action-btns">
                        <div class="action-item">💬 <span>${post.comments}</span></div>
                        <div class="action-item" onclick="handleLike(${index})">❤️ <span id="like-${index}">${post.likes}</span></div>
                    </div>
                    <div>•••</div>
                </div>
            </div>
        `).join('');
        }

        function renderSchools() {
            const container = document.getElementById('school-list-container');
            container.innerHTML = schools.map(s => `
            <div class="school-item" onclick="selectSchool('${s}')">${s}</div>
        `).join('');
        }

        // 交互函数
        function openModal() { document.getElementById('modal').style.display = 'flex'; }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        function selectSchool(name) {
            document.getElementById('current-school-display').innerText = name;
            closeModal();
        }

        function handleLike(index) {
            posts[index].likes += 1;
            document.getElementById(`like-${index}`).innerText = posts[index].likes;
        }

        function handleAddSchool() {
            const pwd = document.getElementById('admin-pwd').value;
            const name = document.getElementById('new-school-name').value;

            if (pwd === "123") { // 演示密码
                if (name) {
                    schools.push(name);
                    renderSchools();
                    alert("添加成功！");
                    document.getElementById('new-school-name').value = "";
                    document.getElementById('admin-pwd').value = "";
                } else {
                    alert("请输入校名");
                }
            } else {
                alert("管理员密码错误！");
            }
        }

        init();
    </script>

</body>

</html>
