<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>学创工坊 - 业务板块</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts: Noto Sans SC -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Noto Sans SC"', 'sans-serif'],
                    },
                    colors: {
                        primary: {
                            50: '#eef2ff',
                            100: '#e0e7ff',
                            400: '#818cf8',
                            500: '#6667AB', // Very Peri
                            600: '#4f46e5',
                        },
                        accent: {
                            50: '#fff7ed',
                            100: '#ffedd5',
                            400: '#FFBE98', // Peach Fuzz
                            500: '#f97316',
                        },
                        surface: '#f8fafc',
                    },
                    boxShadow: {
                        'soft': '0 4px 20px -2px rgba(102, 103, 171, 0.1)',
                        'glow': '0 0 15px rgba(102, 103, 171, 0.3)',
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.3s ease-out forwards',
                        'slide-up': 'slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1)',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { transform: 'translateY(20px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #f1f5f9;
            -webkit-font-smoothing: antialiased;
        }
        .hide-scroll::-webkit-scrollbar { display: none; }
        
        /* Glassmorphism Nav */
        .glass-nav {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(16px);
            border-top: 1px solid rgba(255, 255, 255, 0.5);
        }

        /* Active state for grid items */
        .grid-item.active {
            border-color: #6667AB;
            background-color: #eef2ff;
        }
        .grid-item.active i {
            color: #6667AB;
            transform: scale(1.1);
        }

        /* QR Code Scan Line Animation */
        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: #6667AB;
            box-shadow: 0 0 4px #6667AB;
            animation: scan 2s linear infinite;
        }
        @keyframes scan {
            0% { top: 0; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
    </style>
</head>
<body class="text-slate-800 flex justify-center min-h-screen bg-slate-200">

    <!-- App Container -->
    <div class="w-full max-w-md bg-surface min-h-screen relative shadow-2xl flex flex-col pb-24">
        
        <!-- Header -->
        <header class="px-6 pt-12 pb-4 bg-surface sticky top-0 z-20">
            <h1 class="text-xl font-black text-slate-800 tracking-tight">业务板块</h1>
            <p class="text-[10px] text-slate-400 mt-1">探索更多校园服务与机会</p>
        </header>

        <!-- Main Content -->
        <main class="flex-1 px-5 space-y-6 overflow-y-auto hide-scroll pb-10">

            <!-- 1. Business Grid (3 Columns) -->
            <section class="grid grid-cols-3 gap-3" id="businessGrid">
                <!-- Javascript will populate this -->
            </section>

            <!-- 2. Detail Card (Dynamic Content) -->
            <!-- 这个区域是根据上方点击动态变化的 -->
            <section id="detailSection" class="animate-slide-up">
                <div class="bg-white rounded-2xl p-5 shadow-soft border border-slate-100 relative overflow-hidden group">
                    
                    <!-- Decorative Background -->
                    <div class="absolute top-0 right-0 w-32 h-32 bg-gradient-to-bl from-primary-100 to-transparent rounded-bl-full opacity-50 -mr-10 -mt-10 pointer-events-none"></div>

                    <div class="relative z-10">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <span class="text-[10px] font-bold text-primary-500 bg-primary-50 px-2 py-0.5 rounded-full mb-2 inline-block" id="detailTag">热门业务</span>
                                <h2 class="text-lg font-bold text-slate-800" id="detailTitle">志愿填报</h2>
                            </div>
                            <!-- Icon placeholder for visual flair -->
                            <div class="w-10 h-10 rounded-full bg-slate-50 flex items-center justify-center text-slate-300">
                                <i class="fa-solid fa-arrow-trend-up" id="detailIcon"></i>
                            </div>
                        </div>

                        <div class="flex gap-4">
                            <!-- Text Content -->
                            <div class="flex-1">
                                <p class="text-xs text-slate-500 leading-relaxed mb-4" id="detailDesc">
                                    提供最权威的高考志愿填报咨询服务，大数据分析历年分数线，助你圆梦理想大学。
                                </p>
                                <button class="bg-primary-500 text-white text-xs font-bold px-4 py-2 rounded-lg shadow-lg shadow-primary-500/30 active:scale-95 transition w-full">
                                    立即查看详情
                                </button>
                            </div>

                            <!-- QR Code Container -->
                            <div class="flex-shrink-0 flex flex-col items-center gap-2">
                                <div class="w-24 h-24 bg-white border-2 border-slate-100 rounded-xl p-2 relative overflow-hidden shadow-sm">
                                    <!-- QR Placeholder Image -->
                                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=Example" alt="QR Code" class="w-full h-full object-contain opacity-80">
                                    <!-- Scan Animation -->
                                    <div class="scan-line"></div>
                                </div>
                                <span class="text-[9px] text-slate-400">扫码咨询</span>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

        </main>

        <!-- Navigation -->
        <nav class="absolute bottom-0 w-full glass-nav px-6 py-3 rounded-t-3xl flex justify-between items-center z-30">
            <button class="flex flex-col items-center gap-1 text-slate-400 hover:text-slate-600 transition">
                <i class="fa-solid fa-grid-2 text-xl"></i>
                <span class="text-[10px] font-medium">概览</span>
            </button>
            <button class="flex flex-col items-center gap-1 text-slate-400 hover:text-slate-600 transition">
                <i class="fa-solid fa-chart-simple text-xl"></i>
                <span class="text-[10px] font-medium">报表</span>
            </button>
            <!-- Main Action -->
            <button class="w-12 h-12 bg-slate-800 text-white rounded-full flex items-center justify-center shadow-lg shadow-slate-500/40 -mt-6 border-4 border-surface hover:scale-105 transition">
                <i class="fa-solid fa-plus text-lg"></i>
            </button>
            <button class="flex flex-col items-center gap-1 text-slate-400 hover:text-slate-600 transition">
                <i class="fa-regular fa-comment-dots text-xl"></i>
                <span class="text-[10px] font-medium">消息</span>
            </button>
            <button class="flex flex-col items-center gap-1 text-slate-400 hover:text-slate-600 transition">
                <i class="fa-solid fa-user text-xl"></i>
                <span class="text-[10px] font-medium">我的</span>
            </button>
        </nav>
    </div>

    <script>
        // Data Configuration
        const businessData = [
            { id: 1, title: "志愿填报", icon: "fa-graduation-cap", color: "text-blue-500", bg: "bg-blue-50", desc: "大数据精准匹配，专家一对一指导，为你的未来保驾护航。含历年分数线查询与录取概率分析。" },
            { id: 2, title: "考公考编", icon: "fa-building-columns", color: "text-red-500", bg: "bg-red-50", desc: "最新公考资讯，行测申论真题库，名师视频课程，助你成功上岸。" },
            { id: 3, title: "驾校", icon: "fa-car", color: "text-emerald-500", bg: "bg-emerald-50", desc: "严选本地优质驾校，价格透明，拿证快，VIP班型专车接送。" },
            { id: 4, title: "考研", icon: "fa-book-open-reader", color: "text-indigo-500", bg: "bg-indigo-50", desc: "考研全科辅导，院校专业分析，复试调剂指导，研友社区交流。" },
            { id: 5, title: "排行榜", icon: "fa-ranking-star", color: "text-amber-500", bg: "bg-amber-50", desc: "校园热门兼职、社团、食堂菜品排行榜，实时更新，发现校园精彩。" },
            { id: 6, title: "新生棉被", icon: "fa-bed", color: "text-pink-500", bg: "bg-pink-50", desc: "优选新疆长绒棉，舒适保暖，多种花色可选，开学直接配送到寝室。" },
            { id: 7, title: "招人上班", icon: "fa-briefcase", color: "text-cyan-500", bg: "bg-cyan-50", desc: "校内勤工俭学，周边兼职，企业实习内推，安全可靠的求职平台。" },
            { id: 8, title: "朋友圈素材", icon: "fa-images", color: "text-purple-500", bg: "bg-purple-50", desc: "海量高清文案配图，节日海报，早晚安打卡，一键保存，让你的朋友圈更出彩。" },
            { id: 9, title: "数据图表", icon: "fa-chart-pie", color: "text-teal-500", bg: "bg-teal-50", desc: "可视化数据分析工具，问卷调查结果生成，学术论文图表美化。" },
            { id: 10, title: "相关动态", icon: "fa-newspaper", color: "text-orange-500", bg: "bg-orange-50", desc: "校园新闻，讲座预告，放假通知，重要事务提醒，一手掌握校园动态。" },
            { id: 11, title: "资源文件", icon: "fa-folder-open", color: "text-sky-500", bg: "bg-sky-50", desc: "课件PPT，复习资料，软件安装包，考级真题，免费下载共享。" },
            { id: 12, title: "新人计划", icon: "fa-rocket", color: "text-rose-500", bg: "bg-rose-50", desc: "专为新生打造的成长计划，社团体验，技能培训，快速融入大学生活。" },
        ];

        const gridContainer = document.getElementById('businessGrid');
        const detailSection = document.getElementById('detailSection');
        
        // UI Elements
        const detailTitle = document.getElementById('detailTitle');
        const detailDesc = document.getElementById('detailDesc');
        const detailIcon = document.getElementById('detailIcon');
        const detailTag = document.getElementById('detailTag');

        // Render Grid
        businessData.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = `grid-item bg-white rounded-xl p-3 flex flex-col items-center justify-center gap-2 border border-transparent transition cursor-pointer hover:shadow-sm ${index === 0 ? 'active' : ''}`;
            div.onclick = () => selectItem(index);
            
            div.innerHTML = `
                <div class="w-12 h-12 rounded-full ${item.bg} ${item.color} flex items-center justify-center text-xl transition-transform duration-300">
                    <i class="fa-solid ${item.icon}"></i>
                </div>
                <span class="text-xs font-medium text-slate-600 text-center">${item.title}</span>
            `;
            gridContainer.appendChild(div);
        });

        // Select Logic
        function selectItem(index) {
            const items = document.querySelectorAll('.grid-item');
            items.forEach(item => item.classList.remove('active'));
            items[index].classList.add('active');

            const data = businessData[index];
            
            // Animation reset for the detail card
            detailSection.classList.remove('animate-slide-up');
            void detailSection.offsetWidth; // trigger reflow
            detailSection.classList.add('animate-slide-up');

            // Update Content
            detailTitle.innerText = data.title;
            detailDesc.innerText = data.desc;
            detailIcon.className = `fa-solid ${data.icon}`;
            
            // Random Tag logic for visual variety
            const tags = ["热门推荐", "官方认证", "限时优惠", "新上线"];
            detailTag.innerText = tags[index % tags.length];
        }
    </script>
</body>
</html>
